<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teste Upsell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

body{
background:#e4ecf1;
font-family:"Roboto",Arial,Helvetica,sans-serif;
}

.container{
width:100vw;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.box{
background:white;
border-radius:8px;
display:flex;
flex-direction:column;
align-items:center;
gap:12px;
max-width:400px;
padding:40px 30px;
text-align:center;
}

.logo img{
width:120px;
}

input{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 16px;
border-radius:6px;
border:none;
cursor:pointer;
}

.buy{
background:#28a745;
color:white;
}

</style>

<script src="https://midas.qa12.ticto.dev/oneclickbuy.js"></script>

</head>

<body>

<div class="container">
<div class="box">

<div class="logo">
<img src="https://d2ucq9llvgnbyn.cloudfront.net/Ticto+Logo.svg">
</div>

<h2>Teste de Flow</h2>

<input
id="offerInput"
placeholder="Digite o código da oferta upsell"
/>

<button
type="button"
id="upsellButton"
class="ticto-upsell-button buy"
data-offer-code=""
>
COMPRAR AGORA
</button>

<button
type="button"
class="ticto-refuse-button"
>
NÃO QUERO, OBRIGADO
</button>

</div>
</div>

<script>

document.getElementById("upsellButton").addEventListener("click", function(){

const offer = document.getElementById("offerInput").value

if(!offer){
alert("Digite o código da oferta")
return
}

this.setAttribute("data-offer-code", offer)

})

</script>

</body>
</html>
