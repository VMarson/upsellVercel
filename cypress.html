<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste Upsell</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
body{
  background:#e4ecf1;
  font-family:"Roboto",Arial,Helvetica,sans-serif;
}

.container{
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  background:white;
  border-radius:8px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  max-width:400px;
  padding:40px 30px;
  text-align:center;
}

.logo img{
  width:120px;
}

input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:10px 16px;
  border-radius:6px;
  border:none;
  cursor:pointer;
}

.buy{
  background:#28a745;
  color:white;
}

</style>

<script>

/* pegar env da URL */
const params = new URLSearchParams(window.location.search)
const env = params.get("env") || "qa8"

/* carregar script da Ticto */
var s = document.createElement("script")
s.src = "https://midas." + env + ".ticto.dev/oneclickbuy.js"
document.head.appendChild(s)

</script>

</head>

<body>

<div class="container">
<div class="box">

<div class="logo">
<img src="https://d2ucq9llvgnbyn.cloudfront.net/Ticto+Logo.svg">
</div>

<h2 id="title">Teste de Flow</h2>

<input id="offerInput" placeholder="Digite o código da oferta upsell">

<!-- botão para configurar o código -->
<button id="setOffer" class="buy">
CONFIGURAR OFERTA
</button>

<!-- botão real da Ticto -->
<button
  type="button"
  id="upsellButton"
  class="ticto-upsell-button buy"
  data-offer-code=""
>
COMPRAR UPSELL
</button>

<button
  type="button"
  class="ticto-refuse-button"
>
NÃO QUERO, OBRIGADO
</button>

</div>
</div>

<script>

document.getElementById("title").innerText = "Teste de Flow - " + env

/* configurar offer_code antes da compra */
document.getElementById("setOffer").addEventListener("click", function(){

  const offer = document.getElementById("offerInput").value

  if(!offer){
    alert("Digite o código da oferta")
    return
  }

  document
    .getElementById("upsellButton")
    .setAttribute("data-offer-code", offer)

  alert("Oferta configurada: " + offer)

})

</script>

</body>
</html>
